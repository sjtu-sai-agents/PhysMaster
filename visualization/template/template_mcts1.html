<!doctype html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- p5.js -->
  <script 
    id="p5scripttag" 
    src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"
    integrity="sha512-uaz5GpnQoE6t5echKlX8P52czvsIGgLPcvlzfvRubLZ1Hp8JemUDnbUiAahbVtPb+jUVrNETuXvAhDDF/N3M4w=="
    crossorigin="anonymous" 
    referrerpolicy="no-referrer">
  </script>

  <!-- highlight.js -->
  <link 
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" 
  />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

  <script>
    <!-- placeholder -->
  </script>

  <title>MCTS Reasoning Visualization</title>

  <style>
    body{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      overflow: hidden;
    }
    * {
      box-sizing: border-box;
    }


    body {
      background: radial-gradient(circle at top, #111827 0%, #0B0F19 70%);
      font-family: 'JetBrains Mono', monospace;
      color: #E5E7EB;
    }


    canvas {
      float: left;
      width: 60vw;
      height: 100vh;
      background-color: #f2f0e7;
    }

   #text-container {
      float: right;
      width: 40vw;
      height: 100vh;
      background: linear-gradient(180deg,#111827,#0B1220);
      display: flex;
      flex-direction: column;
      border-left: 1px solid #1F2937;
    }

    .panel-title {
      background: linear-gradient(135deg, #1F2937, #111827);
      color: #4F8CFF;
      padding: 10px 14px;
      font-size: 13px;
      letter-spacing: 3px;
      font-weight: 700;
      border-bottom: 1px solid #1F2937;
      display: flex;
      align-items: center;
    }

    .panel-title::before {
      content: "▍";
      color: #4F8CFF;
      margin-right: 8px;
      font-size: 20px;
    }

    /* 右侧每块区域 */

    #node-info,
    #code,
    #theo_response,
    #crit_response {
      background: rgba(17,24,39,0.6);
      border: 1px solid rgba(79,140,255,0.08);
      box-shadow: 0 0 20px rgba(0,0,0,.3) inset;
      transition: all 0.25s ease;
    }

    #node-info:hover,
    #code:hover,
    #theo_response:hover,
    #crit_response:hover {
      border: 1px solid rgba(79,140,255,0.4);
      background: rgba(17,24,39,0.9);
      transform: translateY(-2px);
    }


    #node-info,
    #code,
    #theo_response,
    #crit_response {
      scroll-behavior: smooth;
      overflow-y: auto;
      overflow-x: hidden;
      word-wrap: break-word;
      white-space: pre-wrap;
      padding: 10px;
      color: #f2f0e7;
      min-height: 0;
    }

    #node-info {
      flex: 1.3;
      min-height: 160px;
      background: #111;
      border-bottom: 1px solid #333;
    }

    #code {
      flex: 1.8;
      background: #282c34;
    }
    #code {
      font-size: 13px;
      border-left: 3px solid #4F8CFF;
    }

    #theo_response {
      flex: 1.4;
      background: #20232a;
    }

    #crit_response {
      flex: 1.4;
      background: #1b1d22;
    }

    code {
      display: block;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 滚动条美化（可选） */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #111;
    }
    ::-webkit-scrollbar-thumb {
      background: #444;
    }
  </style>
</head>

<body>

  <div id="text-container">

    <div class="panel-title">NODE INFO</div>
    <div id="node-info"></div>

    <div class="panel-title">CODE</div>
    <div id="code" class="language-python"></div>

    <div class="panel-title">THEORETICIAN RESPONSE</div>
    <div id="theo_response" class="language-plaintext"></div>

    <div class="panel-title">CRITIC RESPONSE</div>
    <div id="crit_response" class="language-plaintext"></div>


  </div>

</body>
</html>
