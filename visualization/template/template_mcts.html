<!doctype html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- p5.js -->
  <script 
    id="p5scripttag" 
    src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"
    crossorigin="anonymous">
  </script>

  <!-- highlight.js -->
  <link 
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" 
  />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

  <script>
    <!-- placeholder -->
  </script>

  <title>MCTS Reasoning Visualization</title>

  <style>
    body{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      overflow: hidden;
    }
    * {
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at top, #111827 0%, #0B0F19 70%);
      font-family: 'JetBrains Mono', monospace;
      color: #E5E7EB;
    }

    canvas {
      float: left;
      width: 60vw;
      height: 100vh;
      background-color: #f2f0e7;
    }

    #text-container {
      float: right;
      width: 40vw;
      height: 100vh;
      background: linear-gradient(180deg,#111827,#0B1220);
      display: flex;
      flex-direction: column;
      border-left: 1px solid #1F2937;
      overflow: hidden;
    }

    /* ====== TAB BAR ====== */
    #tab-bar {
      display: flex;
      background: #0F1624;
      border-bottom: 1px solid #1F2937;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      color: #9CA3AF;
      background: transparent;
      border: none;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 2px;
      transition: 0.2s;
    }
    .tab-btn:hover {
      color: #4F8CFF;
    }
    .tab-btn.active {
      color: #4F8CFF;
      border-bottom: 2px solid #4F8CFF;
    }

    /* ====== PANEL TITLE ====== */
    .panel-title {
      background: linear-gradient(135deg, #1F2937, #111827);
      color: #4F8CFF;
      padding: 10px 14px;
      font-size: 13px;
      letter-spacing: 3px;
      font-weight: 700;
      border-bottom: 1px solid #1F2937;
      display: flex;
      align-items: center;
    }
    .panel-title::before {
      content: "▍";
      color: #4F8CFF;
      margin-right: 8px;
      font-size: 20px;
    }

    

    /* ====== PANEL CONTENT ====== */

    .panel {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow-y: auto;
    }

    .info-block {
      background: rgba(17,24,39,0.6);
      border: 1px solid rgba(79,140,255,0.08);
      box-shadow: 0 0 20px rgba(0,0,0,.3) inset;
      padding: 10px;
      color: #f2f0e7;
      margin-bottom: 10px;

      white-space: pre-wrap;
      word-break: break-word;
    }

    .info-block:hover {
      border: 1px solid rgba(79,140,255,0.4);
      background: rgba(17,24,39,0.9);
      transform: translateY(-2px);
      transition: 0.25s;
    }

    /* ---- code 高亮区域也要保留换行和长行换行 ---- */
    pre, code {
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #111;
    }
    ::-webkit-scrollbar-thumb {
      background: #444;
    }

  </style>
</head>

<body>

<div id="text-container">

  <!-- === TAB BAR === -->
  <div id="tab-bar">
    <button class="tab-btn active" data-target="panel-node">NODE INFO</button>
    <button class="tab-btn" data-target="panel-theo">THEORETICIAN</button>
    <button class="tab-btn" data-target="panel-crit">CRITIC</button>
  </div>

  <!-- ===========================
       NODE INFO PANEL
  ============================ -->
  <div class="panel" id="panel-node" style="display:flex;">

    <div class="panel-title">BASIC INFO</div>
    <div class="info-block" id="node-info"></div>

    <div class="panel-title">TASK QUERY</div>
    <div class="info-block" id="task_query"></div>

  </div>

  <!-- ===========================
       THEORETICIAN PANEL
  ============================ -->
  <div class="panel" id="panel-theo">

    <div class="panel-title">ANALYSIS</div>
    <div class="info-block" id="analysis"></div>

    <div class="panel-title">CORE RESULT</div>
    <div class="info-block" id="core_results"></div>

    <div class="panel-title">CODE</div>
    <div class="info-block"><pre><code id="code" class="language-python"></code></pre></div>

    <div class="panel-title">FILES</div>
    <div class="info-block" id="files"></div>

  </div>

  <!-- ===========================
       CRITIC PANEL
  ============================ -->
  <div class="panel" id="panel-crit">

    <div class="panel-title">DECISION</div>
    <div class="info-block" id="decision"></div>

    <div class="panel-title">SCORE</div>
    <div class="info-block" id="score"></div>

    <div class="panel-title">SUMMARY</div>
    <div class="info-block" id="summary"></div>

    <div class="panel-title">OPINION</div>
    <div class="info-block" id="opinion"></div>

  </div>

</div>


<!-- ===== TAB SWITCH SCRIPT ===== -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  const buttons = document.querySelectorAll(".tab-btn");
  const panels = document.querySelectorAll(".panel");

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      buttons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      let tgt = btn.dataset.target;
      panels.forEach(p => p.style.display = "none");
      document.getElementById(tgt).style.display = "flex";
    });
  });
});
</script>

</body>
</html>
