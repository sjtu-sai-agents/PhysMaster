# PhysMaster Configs

llm:
  base_url: "Your Base URL"
  api_key: "Your Api Key"
  model: "GPT-5"

# Basics
pipeline:
  query_file: "instructions/test.txt"
  output_path: "outputs"
  parallel_processes: 3
  max_rounds: 24

mcts:
  draft_expansion: 2
  revise_expansion: 1
  exploration_constant: 1.414
  active_beam_width: 3

# Clarifier settings
clarifier:
  max_key_concpets: 5

skills:
  enabled: true
  roots:
    - "LANDAU/skills"

# LANDAU settings
landau:
  library_enabled: true
  library: "LANDAU/library"
  
  workflow_enabled: true
  workflow: "LANDAU/workflow"

  prior_enabled: false
  prior: "LANDAU/prior"

visualization:
  enabled: true
