# LaMET
technique_id: lamet_asymptotic_expansion
category: mathematics
domain: qcd

goal: >
  Relate quasi-observables computed at finite hadron momentum
  to their light-cone counterparts using the large-momentum
  (LaMET) asymptotic expansion.

scope:
  - hadron momentum P_z >> Lambda_QCD
  - leading-power LaMET only
  - neglect O(1 / P_z^2) power corrections

inputs:
  quasi_observable:
    description: >
      Renormalized quasi-distribution or quasi-TMD matrix element
      defined with spacelike Wilson lines.
  hadron_momentum:
    symbol: P_z
    requirement: large
  renormalization_scale:
    symbol: mu

outputs:
  factorized_form:
    description: >
      Leading-power factorized expression relating the quasi-
      observable to the corresponding light-cone quantity.
  power_counting_statement:
    description: >
      Explicit statement of neglected power corrections and
      their parametric scaling.

method:
  - identify_large_momentum_variable:
      description: >
        Specify the hadron momentum component taken to infinity
        and fix the reference frame.
  - perform_power_expansion:
      description: >
        Expand the quasi-observable in powers of 1 / P_z and
        retain the leading-power term.
  - match_operator_structures:
      description: >
        Identify the light-cone operator corresponding to the
        leading term in the expansion.
  - state_factorization_formula:
      description: >
        Write the LaMET factorization relation at leading power,
        including perturbative matching if required.

quality_gate:
  - leading_term_is_Pz_independent:
      description: >
        The extracted leading contribution does not depend on
        P_z up to higher-order corrections.
  - power_corrections_are_parametrically_suppressed:
      description: >
        Subleading terms scale as O(1 / P_z^2) or smaller.