# 量级合理性分析
technique_id: order_of_magnitude_sanity_check
category: general

goal: >
  Verify that the magnitude of a result is consistent with
  basic physical or dimensional expectations.

scope:
  - results with known characteristic scales

inputs:
  result_value:
    description: >
      Numerical or symbolic value of the result.
  reference_scale:
    description: >
      Expected physical or dimensional scale.

outputs:
  sanity_statement:
    description: >
      Assessment of whether the result has a reasonable
      order of magnitude.

method:
  - identify_relevant_scales:
      description: >
        Identify the natural scales controlling the problem.
  - compare_scales:
      description: >
        Compare the result against the reference scale.
  - assess_deviation:
      description: >
        Judge whether deviations are expected or problematic.

quality_gate:
  - magnitude_is_reasonable:
      description: >
        The result is not parametrically inconsistent.
